<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 1100 275">
  <style>
    /* shared green drop-shadow on the brand elements */
    #Ziex, #Ziex-Moto, #Ziex-Logo {
      filter: drop-shadow(0 0 10px rgba(74,222,128,.18));
    }

    /*  "Ziex" + moto fly in from the left  */
    #Ziex      { opacity: 0; animation: flyLeft 5s cubic-bezier(.22,1,.36,1) .05s 1 forwards; }
    #Ziex-Moto { opacity: 0; animation: flyLeft 5s cubic-bezier(.22,1,.36,1) .18s 1 forwards; }
    @keyframes flyLeft {
      0%   { opacity: 0; transform: translateX(-140px); }
      13%  { opacity: 1; transform: translateX(0); }
      100% { opacity: 1; transform: translateX(0); }
    }

    /*  quoted word flips up like a tile: "speed" → "safety" → "simplicity"
       each word rotates up around its own horizontal centre — the outgoing word
       flips away over the top while the next flips up from the bottom. */
    .word {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
    }
    .word-1 { animation: flip1 5s cubic-bezier(.5,0,.2,1) .18s 1 forwards; }
    .word-2 { animation: flip2 5s cubic-bezier(.5,0,.2,1) .18s 1 forwards; }
    .word-3 { animation: flip3 5s cubic-bezier(.5,0,.2,1) .18s 1 forwards; }

    /* a flat tile lying face-down below the line, hinging up into view */
    /* cycling waits for the logo splash + shine, then runs in the back half */
    @keyframes flip1 {  /* "speed" sits flat through the intro, then flips away up */
      0%, 55% { opacity: 1; transform: perspective(300px) rotateX(0); }
      62%     { opacity: 0; transform: perspective(300px) translateY(-14px) rotateX(90deg); }
      100%    { opacity: 0; transform: perspective(300px) translateY(-14px) rotateX(90deg); }
    }
    @keyframes flip2 {  /* "safety" flips up as "speed" leaves, then flips away */
      0%, 55% { opacity: 0; transform: perspective(300px) translateY(14px) rotateX(-90deg); }
      62%     { opacity: 1; transform: perspective(300px) rotateX(0); }
      76%     { opacity: 1; transform: perspective(300px) rotateX(0); }
      83%     { opacity: 0; transform: perspective(300px) translateY(-14px) rotateX(90deg); }
      100%    { opacity: 0; transform: perspective(300px) translateY(-14px) rotateX(90deg); }
    }
    @keyframes flip3 {  /* "simplicity" flips up last and holds to the end */
      0%, 76% { opacity: 0; transform: perspective(300px) translateY(14px) rotateX(-90deg); }
      83%     { opacity: 1; transform: perspective(300px) rotateX(0); }
      100%    { opacity: 1; transform: perspective(300px) rotateX(0); }
    }

    /* blinking trailing semicolon — like a terminal cursor */
    .cursor { animation: blink 1.1s step-end 1 forwards; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /*  logo assembles from two halves sliding in ─ */
    .chunk {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: assemble 5s cubic-bezier(.22,1,.36,1) .1s 1 forwards;
    }
    .chunk-left  { --from: -120px; }
    .chunk-right { --from:  120px; }
    @keyframes assemble {
      0%   { opacity: 0; transform: translateX(var(--from)) scale(.92); }
      16%  { opacity: 1; transform: translateX(0) scale(1); }
      100% { opacity: 1; transform: translateX(0) scale(1); }
    }

    /*  sword shine sweeps across the logo after it assembles ─ */
    #shine {
      opacity: 0;
      animation: shine 5s ease-in-out 1 forwards;
      filter: drop-shadow(0 0 10px rgba(204,255,224,.7));
    }
    @keyframes shine {
      0%, 24% { opacity: 0; transform: translateX(-160px) skewX(-18deg); }
      30%     { opacity: 1; }
      48%     { opacity: 1; transform: translateX(160px) skewX(-18deg); }
      55%, 100% { opacity: 0; transform: translateX(200px) skewX(-18deg); }
    }
  </style>

  <g id="Banner">
    <path fill="#0c1117" d="M0 0h1100v208c0 37-30 67-67 67H0z"/>

    <g id="Container">
      <g id="Ziex Text Logo">
        <text xml:space="preserve" id="Ziex" fill="#fff" font-family="Inter, sans-serif" font-size="70" font-weight="bold" letter-spacing="0" style="white-space:pre"><tspan x="100" y="139">Ziex</tspan></text>
      </g>
      <g id="Ziex Moto">
        <g id="Ziex-Moto" font-family="Cousine, Courier New, Courier, monospace" font-size="22" letter-spacing="0">
          <text xml:space="preserve" fill="#569cd6" style="white-space:pre"><tspan x="100" y="182">const</tspan></text>
          <text xml:space="preserve" fill="#4ade80" style="white-space:pre"><tspan x="179" y="182">web</tspan></text>
          <text xml:space="preserve" fill="#fff" style="white-space:pre"><tspan x="232" y="182">=</tspan></text>
          <text xml:space="preserve" fill="#ffd885" style="white-space:pre"><tspan x="259" y="182">@import</tspan></text>

          <!-- (…) ; travels with the word so widths never collide as it cycles -->
          <text xml:space="preserve" class="word word-1" fill="#d4d4d4" style="white-space:pre"><tspan x="351" y="182">(<tspan fill="#ce9178">”speed”</tspan>)<tspan class="cursor">;</tspan></tspan></text>
          <text xml:space="preserve" class="word word-2" fill="#d4d4d4" style="white-space:pre"><tspan x="351" y="182">(<tspan fill="#ce9178">”safety”</tspan>)<tspan class="cursor">;</tspan></tspan></text>
          <text xml:space="preserve" class="word word-3" fill="#d4d4d4" style="white-space:pre"><tspan x="351" y="182">(<tspan fill="#ce9178">”simplicity”</tspan>)<tspan class="cursor">;</tspan></tspan></text>
        </g>
      </g>
    </g>

    <g id="Ziex-Logo" clip-path="url(#clip0_8_3)">
      <g fill="#4ade80">
        <g class="chunk chunk-right">
          <path d="M963 78h-97v20h97z"/>
          <path d="m976 98-20-20h40z"/>
          <path d="m978 95-15-14-46 44 14 14z"/>
        </g>
        <g class="chunk chunk-left">
          <path d="m923 119 21 20h-42z"/>
          <path d="m949 150-20-19h41z"/>
          <path d="m952 148-15-14-46 44 15 14z"/>
          <path d="m891 177 20 20h-40z"/>
          <path d="m911 197-20-19h41z"/>
          <path d="M885 97v20l-20-20z"/>
        </g>
        <g class="chunk chunk-right">
          <path d="M1000 177h-94v20h94z"/>
          <path d="M981 178v-20l19 20z"/>
        </g>
      </g>

      <!-- shine sweep, clipped to the logo silhouette -->
      <g clip-path="url(#clipLogo)">
        <rect id="shine" x="845" y="60" width="180" height="160" fill="url(#shineGrad)"/>
      </g>
    </g>
  </g>

  <defs>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#fff" stop-opacity="0"/>
      <stop offset=".35"  stop-color="#fff" stop-opacity=".14"/>
      <stop offset=".47"  stop-color="#fff" stop-opacity=".72"/>
      <stop offset=".5"   stop-color="#ccffe0" stop-opacity="1"/>
      <stop offset=".53"  stop-color="#fff" stop-opacity=".72"/>
      <stop offset=".65"  stop-color="#fff" stop-opacity=".14"/>
      <stop offset="1"    stop-color="#fff" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="clip0_8_3">
      <path fill="#fff" d="M865 78h135v120H865z"/>
    </clipPath>

    <clipPath id="clipLogo">
      <path d="M963 78h-97v20h97z"/>
      <path d="m976 98-20-20h40z"/>
      <path d="m978 95-15-14-46 44 14 14z"/>
      <path d="m923 119 21 20h-42z"/>
      <path d="m949 150-20-19h41z"/>
      <path d="m952 148-15-14-46 44 15 14z"/>
      <path d="m891 177 20 20h-40z"/>
      <path d="m911 197-20-19h41z"/>
      <path d="M1000 177h-94v20h94z"/>
      <path d="M981 178v-20l19 20z"/>
      <path d="M885 97v20l-20-20z"/>
    </clipPath>
  </defs>
</svg>
